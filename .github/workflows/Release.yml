name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Extracted version: $TAG"
        shell: bash

      - name: Update pyproject.toml version
        run: |
          python -c "
          import re
          version = '${{ steps.version.outputs.version }}'
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          content = re.sub(
              r'^version = .*',
              f'version = \"{version}\"',
              content, count=1, flags=re.MULTILINE
          )
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          print(f'Updated version to: {version}')
          "

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add pyproject.toml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline --no-merges HEAD | head -20)
          else
            CHANGES=$(git log --oneline --no-merges "${PREV_TAG}"..HEAD)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changes }}

            ## 安装
            ```bash
            pip install ez-wechatblog==${{ steps.version.outputs.version }}
            ```

            ## Assets
            - [PyPI](https://pypi.org/project/ez-wechatblog/${{ steps.version.outputs.version }}/)
          files: dist/*
          draft: false
          prerelease: false
