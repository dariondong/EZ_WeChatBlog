name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Beta
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract and normalize version
        id: version
        env:
          RAW_TAG: ${{ github.ref_name }}
        run: |
          VERSION=$(python3 -c "
          import os, re
          tag = os.environ['RAW_TAG']
          # Beta 标签：26.1-Beta1-20260429A
          beta_match = re.match(r'^(\d+\.\d+)-Beta(\d+)-(\d{8})[A-Z]$', tag)
          if beta_match:
              major_minor, beta_num, date = beta_match.groups()
              tag = f'{major_minor}.b{beta_num}.post{date}'
              print(tag)
              exit(0)
          # 工程号标签：20260430A / 20260430B / 20260430C / 20260430D
          eng_match = re.match(r'^(\d{4})(\d{2})(\d{2})[A-Z]$', tag)
          if eng_match:
              y, m, d = eng_match.groups()
              with open('pyproject.toml', 'r') as f:
                  content = f.read()
              version_match = re.search(r'^version = \"(\d+\.\d+)', content, re.MULTILINE)
              major_minor = version_match.group(1) if version_match else '0.0'
              tag = f'{major_minor}.dev{y}{m}{d}'
              print(tag)
              exit(0)
          print(tag)
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$RAW_TAG" >> $GITHUB_OUTPUT
          echo "Original tag: $RAW_TAG"
          echo "Normalized version: $VERSION"

      - name: Update pyproject.toml
        id: update
        run: |
          TARGET_VERSION="${{ steps.version.outputs.version }}"
          CURRENT_VERSION=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml || echo "")
          echo "Current version: $CURRENT_VERSION"
          echo "Target version: $TARGET_VERSION"
          if [ "$CURRENT_VERSION" = "$TARGET_VERSION" ]; then
            echo "Version already up to date. Skipping."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          python3 -c "
          import re
          target = '${TARGET_VERSION}'
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          match = re.search(r'^version = .*', content, flags=re.MULTILINE)
          if not match:
              raise ValueError('version not found in pyproject.toml')
          print(f'Before: {match.group()}')
          content = re.sub(
              r'^version = .*',
              f'version = \"{target}\"',
              content,
              count=1,
              flags=re.MULTILINE
          )
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          with open('pyproject.toml', 'r') as f:
              new = f.read()
          new_match = re.search(r'^version = .*', new, flags=re.MULTILINE)
          print(f'After: {new_match.group()}')
          "
          git diff pyproject.toml
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin Beta
          echo "✅ Version pushed to Beta"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline --no-merges HEAD | head -20)
          else
            CHANGES=$(git log --oneline --no-merges "${PREV_TAG}"..HEAD)
          fi
          if [ -z "$CHANGES" ]; then
            CHANGES="No changes since previous release"
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
