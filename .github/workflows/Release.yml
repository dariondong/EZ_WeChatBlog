name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract and normalize version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(python -c "
          import re, sys
          tag = '$TAG'
          # Alpha
          tag = re.sub(r'-?Alpha(\d*)', lambda m: '.a' + (m.group(1) or '0'), tag, flags=re.IGNORECASE)
          # Beta
          tag = re.sub(r'-?Beta(\d*)', lambda m: '.b' + (m.group(1) or '0'), tag, flags=re.IGNORECASE)
          # RC
          tag = re.sub(r'-?RC(\d*)', lambda m: '.rc' + (m.group(1) or '0'), tag, flags=re.IGNORECASE)
          # 剩余连字符 → 点
          tag = tag.replace('-', '.')
          # 去掉工程号（字母后缀如 .20260429C → .post20260429）
          tag = re.sub(r'\.(\d{8})[A-Za-z]*$', r'.post\1', tag)
          print(tag)
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Original: $TAG"
          echo "Normalized: $VERSION"
        shell: bash

      - name: Update pyproject.toml and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          python -c "
          import re
          version = '${{ steps.version.outputs.version }}'
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          content = re.sub(
              r'^version = .*',
              f'version = \"{version}\"',
              content, count=1, flags=re.MULTILINE
          )
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          print(f'Updated to: {version}')
          "
          git add pyproject.toml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline --no-merges HEAD | head -20)
          else
            CHANGES=$(git log --oneline --no-merges "${PREV_TAG}"..HEAD)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changes }}
          draft: false
          prerelease: false
