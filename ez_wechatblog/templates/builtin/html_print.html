<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ metadata.title }}</title>
  <meta name="author" content="{{ metadata.author }}">
  <meta name="date" content="{{ metadata.date }}">
  <style>
    @media print { body { font-size: 12pt; } }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { max-width: 700px; margin: 0 auto; padding: 3em 2em; line-height: 1.9; font-size: 17px; font-family: 'Georgia', 'Noto Serif SC', serif; color: #333; }
    h1 { font-size: 1.8em; margin-bottom: 0.5em; border-bottom: 2px solid #333; padding-bottom: 0.3em; }
    h2 { font-size: 1.4em; margin: 2em 0 0.5em; border-bottom: 1px solid #ccc; padding-bottom: 0.2em; }
    h3 { font-size: 1.2em; margin: 1.5em 0 0.5em; }
    pre { background: #f8f8f8; padding: 1em; overflow-x: auto; border: 1px solid #ddd; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.85em; line-height: 1.5; }
    code { background: #f0f0f0; padding: 0.15em 0.3em; border-radius: 2px; font-size: 0.9em; }
    pre code { background: none; padding: 0; }
    img { max-width: 100%; height: auto; display: block; margin: 1em auto; }
    blockquote { border-left: 3px solid #999; margin: 1em 0; padding: 0.5em 1em; color: #666; font-style: italic; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 0.95em; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; }
    th { background: #f5f5f5; font-weight: bold; }
    a { color: #1a5276; text-decoration: underline; }
    .meta { color: #888; margin-bottom: 2em; font-size: 0.85em; }
    hr { border: none; border-top: 1px solid #ddd; margin: 2em 0; }
  </style>
</head>
<body>
  <article>
    <header>
      <h1>{{ metadata.title }}</h1>
      <p class="meta">
        {% if metadata.author %}作者：{{ metadata.author }} · {% endif %}
        {% if metadata.date %}{{ metadata.date }}{% endif %}
        {% if metadata.url %}
         · <a href="{{ metadata.url }}">原文链接</a>
        {% endif %}
      </p>
    </header>
    <div class="content">
{{ body }}
    </div>
  </article>
</body>
</html>
