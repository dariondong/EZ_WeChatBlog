<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ metadata.title }}</title>
  <meta name="author" content="{{ metadata.author }}">
  <meta name="date" content="{{ metadata.date }}">
  {% if metadata.tags %}
  <meta name="keywords" content="{{ metadata.tags | join(', ') }}">
  {% endif %}
  <style>
    :root { --bg: #1e1e2e; --fg: #cdd6f4; --accent: #89b4fa; --code-bg: #313244; --border: #45475a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { max-width: 800px; margin: 0 auto; padding: 2em; background: var(--bg); color: var(--fg); line-height: 1.8; font-size: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    h1 { color: var(--accent); margin-bottom: 0.3em; }
    h2, h3, h4 { color: var(--accent); margin: 1.5em 0 0.5em; }
    pre { background: var(--code-bg); padding: 1em; overflow-x: auto; border-radius: 6px; border: 1px solid var(--border); }
    code { background: var(--code-bg); padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.9em; }
    pre code { background: none; padding: 0; }
    img { max-width: 100%; height: auto; border-radius: 6px; }
    blockquote { border-left: 4px solid var(--accent); margin: 1em 0; padding: 0.5em 1em; background: var(--code-bg); border-radius: 0 6px 6px 0; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    th { background: var(--code-bg); }
    a { color: var(--accent); }
    .meta { color: #a6adc8; margin-bottom: 2em; font-size: 0.9em; }
    .meta a { color: #89dceb; }
  </style>
</head>
<body>
  <article>
    <header>
      <h1>{{ metadata.title }}</h1>
      <p class="meta">
        {% if metadata.author %}{{ metadata.author }} · {% endif %}
        {% if metadata.date %}{{ metadata.date }}{% endif %}
        {% if metadata.url %}
         · <a href="{{ metadata.url }}">原文链接</a>
        {% endif %}
        {% if metadata.tags %}
         · {{ metadata.tags | join(', ') }}
        {% endif %}
      </p>
    </header>
    <div class="content">
{{ body }}
    </div>
  </article>
</body>
</html>
